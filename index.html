<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="leaf-container">
        <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
        <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
    </div>

    <div class="scroll-paper">
        <div class="scroll-content">
            <h1>Happy Birthday, Charise!</h1>
            <div class="haiku">
                <p>Maple leaves in flight,</p>
                <p>A new year dawns in the light,</p>
                <p>Peace be yours tonight.</p>
            </div>
            
            <p class="letter-text">
                [Your heartfelt message goes here...]
            </p>
            
            <div class="polaroid-row">
                <div class="polaroid">
                    <img src="kazuha1.jpg" alt="Memory 1">
                    <p>A wandering heart</p>
                </div>
                <div class="polaroid">
                    <img src="kazuha2.jpg" alt="Memory 2">
                    <p>Autumn's grace</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
