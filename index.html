<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <input type="checkbox" id="scroll-toggle">
    
    <label for="scroll-toggle" class="scroll-container">
        
        <div class="leaf-system">
            <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
            <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
            <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
            <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
            <div class="leaf"><img src="leaf1.png" alt="leaf"></div>
            <div class="leaf"><img src="leaf2.png" alt="leaf"></div>
        </div>

        <div class="scroll-wrapper">
            <div class="roller top"></div>
            
            <div class="scroll-body">
                <div class="letter-content">
                    <h2>Dearest Charise,</h2>
                    <p class="text">
                        [Your birthday message here...]
                    </p>
                    <div class="polaroid-row">
                        <div class="polaroid"><img src="kazuha1.jpg"><p>A wandering heart</p></div>
                    </div>
                </div>
            </div>
            
            <div class="roller bottom"></div>
            <div class="ribbon"></div>
            <div class="hint-text">Tap to unroll</div>
        </div>
    </label>

</body>
</html>
