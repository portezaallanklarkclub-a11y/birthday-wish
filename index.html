<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="leaf-container"></div>

    <div id="intro-screen" class="centered">
        <div class="intro-card">
            <h1>Happy Birthday!</h1>
            <div class="haiku">
                <p>Maple leaves in flight,</p>
                <p>A new year dawns in the light,</p>
                <p>Peace be yours tonight.</p>
            </div>
            <button onclick="openScroll()" class="open-btn">Follow the Wind 🍁</button>
        </div>
    </div>

    <div id="scroll-section" class="hidden">
        <div class="scroll-paper">
            <div class="scroll-content">
                <h2>To my Dearest Charise,</h2>
                <p class="letter-text">
                    [Insert your message for Charise here!]
                </p>
                
                <div class="polaroid-row">
                    <div class="polaroid">
                        <img src="kazuha1.jpg" alt="Kazuha 1">
                        <p>A wandering heart</p>
                    </div>
                    <div class="polaroid">
                        <img src="kazuha2.jpg" alt="Kazuha 2">
                        <p>Autumn's grace</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Act 1: Handles the transition from the intro card to the letter.
         */
        function openScroll() {
            const intro = document.getElementById('intro-screen');
            const scroll = document.getElementById('scroll-section');
            
            // Start the fade out of the first card
            intro.classList.add('fade-out');
            
            setTimeout(() => {
                intro.style.display = 'none';
                scroll.classList.remove('hidden');
                scroll.classList.add('fade-in');
                
                // Start the leaf animation once the letter appears
                generateLeaves();
            }, 600);
        }

        /**
         * Act 2: Generates the massive, cradled maple leaves.
         */
        function generateLeaves() {
            const container = document.getElementById('leaf-container');
            const leafImages = ['leaf1.png', 'leaf2.png'];
            
            // We use 10 leaves because they are now much LARGER.
            for(let i=0; i<10; i++) {
                let leaf = document.createElement('div');
                leaf.className = 'leaf';
                
                // Randomly select one of your two leaf images
                let imgNum = leafImages[Math.floor(Math.random() * leafImages.length)];
                
                // --- CINEMATIC SIZE: 160px to 230px ---
                let size = Math.random() * 70 + 160; 
                
                leaf.innerHTML = `<img src="${imgNum}" style="width: ${size}px; height: auto;">`;
                
                // Spread them randomly across the width of the screen
                leaf.style.left = Math.random() * 100 + 'vw';
                
                // Timing for the "Cradled" effect
                let fallDur = (Math.random() * 10 + 22) + 's'; // Slow, heavy descent
                let swayDur = (Math.random() * 2 + 5) + 's';   // Gentle side-to-side sway
                let delay = (Math.random() * 15) + 's';        // Staggers the start times

                // Apply the combined animations
                leaf.style.animation = `
                    fall ${fallDur} linear infinite ${delay}, 
                    sway ${swayDur} ease-in-out infinite ${delay}
                `;
                
                container.appendChild(leaf);
            }
        }
    </script>
</body>
</html>
