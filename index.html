<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="intro-screen" class="centered">
        <div class="intro-card">
            <h1>Happy Birthday!</h1>
            <div class="haiku">
                <p>Maple leaves in flight,</p>
                <p>A new year dawns in the light,</p>
                <p>Peace be yours tonight.</p>
            </div>
            <button onclick="openScroll()" class="open-btn">Follow the Wind 🍁</button>
        </div>
    </div>

    <div id="scroll-section" class="hidden">
        <div id="leaf-container"></div> <div class="scroll-paper">
            <div class="scroll-content">
                <h2>To my Dearest Charise,</h2>
                <p class="letter-text">
                    [Insert your message for Charise here!]
                </p>
                
                <div class="polaroid-row">
                    <div class="polaroid"><img src="kazuha1.jpg"><p>A wandering heart</p></div>
                    <div class="polaroid"><img src="kazuha2.jpg"><p>Autumn's grace</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openScroll() {
            const intro = document.getElementById('intro-screen');
            const scroll = document.getElementById('scroll-section');
            
            intro.classList.add('fade-out');
            
            setTimeout(() => {
                intro.style.display = 'none';
                scroll.classList.remove('hidden');
                scroll.classList.add('fade-in');
                generateLeaves();
            }, 600);
        }

        function generateLeaves() {
            const container = document.getElementById('leaf-container');
            const leafImages = ['leaf1.png', 'leaf2.png'];
            
            for(let i=0; i<15; i++) {
                let leaf = document.createElement('div');
                leaf.className = 'leaf';
                let imgNum = leafImages[Math.floor(Math.random() * leafImages.length)];
                
                let size = Math.random() * 30 + 100; // Large leaves
                leaf.innerHTML = `<img src="${imgNum}" style="width: ${size}px; height: auto;">`;
                
                leaf.style.left = Math.random() * 100 + 'vw';
                // The "Cradle" effect: slow fall + swaying
                leaf.style.animationDuration = (Math.random() * 10 + 20) + 's, ' + (Math.random() * 2 + 4) + 's';
                leaf.style.animationDelay = (Math.random() * 15) + 's';
                
                container.appendChild(leaf);
            }
        }
    </script>
</body>
</html>
