<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. NEWLY ADDED SIDE LEAVES (Place them here) -->
    <img src="leaf1.png" class="side-leaf leaf-left" alt="Maple Leaf">
    <img src="leaf2.png" class="side-leaf leaf-right" alt="Maple Leaf">

    <!-- The Interactive Envelope -->
    <div class="envelope-wrapper" id="envelope-wrapper" onclick="openLetter()">
        <div class="envelope">
            <div class="flap"></div>
            <div class="body"></div>
            <div class="seal">🍁</div>
        </div>
        <p class="instruction">A message for you has arrived... <br> (Click to open)</p>
    </div>

    <!-- The Letter Content (Initially Hidden) -->
    <div class="letter-overlay" id="letter-overlay">
        <div class="leaf-container" id="leaf-container"></div>
        
        <div class="scroll-content">
            <div class="haiku">
                <p>Autumn leaves drift by,</p>
                <p>A new year begins for you,</p>
                <p>Peace follows your path.</p>
            </div>
            
            <article class="message">
                <h2>Happy Birthday, [Name]!</h2>
                <p>
                    [Your heartfelt message goes here.]
                </p>
                
                <div class="polaroid-row">
                    <div class="polaroid"><img src="kazuha1.jpg"><p>A wandering heart</p></div>
                    <div class="polaroid"><img src="kazuha2.jpg"><p>Autumn's grace</p></div>
                </div>
            </article>
        </div>
    </div>

    <script>
        function openLetter() {
            document.getElementById('envelope-wrapper').classList.add('open-anim');
            
            setTimeout(() => {
                document.getElementById('letter-overlay').classList.add('visible');
                document.body.classList.add('bg-active');
                generateLeaves();
            }, 800);
        }

        function generateLeaves() {
            const container = document.getElementById('leaf-container');
            for(let i=0; i<15; i++) {
                let leaf = document.createElement('div');
                leaf.className = 'leaf';
                // 2. UPDATED TO USE YOUR IMAGE FOR FALLING LEAVES
                leaf.innerHTML = `<img src="leaf1.png" style="width: 30px; height: auto;">`;
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(leaf);
            }
        }
    <script src="script.js"></script>
</body>
</html>
