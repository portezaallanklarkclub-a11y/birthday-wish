    <div id="envelope" onclick="openLetter()">
        <div class="maple-seal">🍁</div>
        <p>A message carried by the wind...</p>
    </div>
    
    <div id="message" class="hidden">
        <h1>To a Kind Soul,</h1>
        <p class="archaic-text">
            "The wind has whispered of a special day. 
            May your path be clear and your heart as light as a falling leaf."
        </p>
        <div class="letter-body">
            <!-- Your personal message goes here -->
            Happy Birthday! [Your Message]
        </div>
        <p class="signature">— A humble wanderer</p>
    </div>
</div>
