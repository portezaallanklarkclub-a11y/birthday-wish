<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-screen" class="centered">
        <div class="intro-card">
            <h1>Happy Birthday!</h1>
            <div class="haiku">
                <p>Maple leaves in flight,</p>
                <p>A new year dawns in the light,</p>
                <p>Peace be yours tonight.</p>
            </div>
            <button onclick="openScroll()" class="open-btn">Follow the Wind 🍁</button>
        </div>
    </div>

    <div id="scroll-section" class="hidden">
        <div class="leaf-container" id="leaf-container"></div>
        
        <div class="scroll-paper">
            <div class="scroll-content">
                <h2>To my Dearest [Name],</h2>
                <p class="letter-text">
                    [Insert your full birthday letter here!]
                </p>
                
                <div class="polaroid-row">
                    <div class="polaroid"><img src="kazuha1.jpg"><p>A wandering heart</p></div>
                    <div class="polaroid"><img src="kazuha2.jpg"><p>Autumn's grace</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openScroll() {
            document.getElementById('intro-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('scroll-section').classList.remove('hidden');
                document.getElementById('scroll-section').classList.add('fade-in');
                generateLeaves();
            }, 600);
        }

        function generateLeaves() {
            const container = document.getElementById('leaf-container');
            
            // Create a mix of both leaf images you provided
            const leaves = ['leaf1.png', 'leaf2.png'];
            
            for(let i=0; i<20; i++) {
                let leaf = document.createElement('div');
                leaf.className = 'leaf';
                
                // Randomly select one of your leaf images
                let randomLeaf = leaves[Math.floor(Math.random() * leaves.length)];
                
                // LARGER SIZE (Set to 60px wide)
                leaf.innerHTML = `<img src="${randomLeaf}" style="width: 60px; height: auto;">`;
                
                // Randomize position across the whole screen width
                leaf.style.left = Math.random() * 100 + 'vw';
                
                // MUCH SLOWER (A duration between 12 and 20 seconds)
                leaf.style.animationDuration = (Math.random() * 8 + 12) + 's';
                
                // Staggered delay for that natural "tree" fall
                leaf.style.animationDelay = Math.random() * 10 + 's';
                
                container.appendChild(leaf);
            }
        }
    </script>
</body>
</html>
