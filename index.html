<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Scenery -->
    <div class="bg-overlay"></div>

    <!-- Act 1: The Intro Button -->
    <div id="intro-screen" class="centered">
        <div class="intro-card">
            <h1>Happy Birthday!</h1>
            <p class="haiku">"Leaves fall, wind whispers,<br>A path unfolds just for you,<br>Happy day of birth."</p>
            <button onclick="openScroll()" class="open-btn">Open the Scroll 🍁</button>
        </div>
    </div>

    <!-- Act 2: The Scroll (Hidden until clicked) -->
    <div id="scroll-section" class="hidden">
        <div class="scroll-paper">
            <div class="scroll-content">
                <h2>To my Dearest [Name],</h2>
                <p>
                    [Your heartfelt birthday letter goes here. You can make this 
                    as long as you want; the paper will grow with your text.]
                </p>
                
                <div class="polaroid-row">
                    <div class="polaroid"><img src="kazuha1.jpg"><p>Wandering Heart</p></div>
                    <div class="polaroid"><img src="kazuha2.jpg"><p>Autumn Grace</p></div>
                </div>
            </div>
        </div>
        <div class="leaf-container" id="leaf-container"></div>
    </div>

    <script>
        function openScroll() {
            document.getElementById('intro-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('scroll-section').classList.remove('hidden');
                document.getElementById('scroll-section').classList.add('fade-in');
                generateLeaves();
            }, 500);
        }

        function generateLeaves() {
            const container = document.getElementById('leaf-container');
            for(let i=0; i<15; i++) {
                let leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.innerHTML = '🍁'; // Simple emoji for now to ensure it works
                leaf.style.left = Math.random() * 100 + 'vw';
                leaf.style.animationDuration = (Math.random() * 3 + 4) + 's';
                leaf.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(leaf);
            }
        }
    </script>
</body>
</html>
