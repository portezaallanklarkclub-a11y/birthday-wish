<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Message on the Wind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="leaf-container"></div> <!-- For falling leaves -->

    <section class="hero">
        <h1>Happy Birthday</h1>
        <p class="subtitle">"The wind knows all, and today it carries a message for you."</p>
    </section>

    <div class="scroll-container">
        <div class="letter-content">
            <h2>To my dearest [Name],</h2>
            <p>
                [Your heartfelt birthday message goes here. Talk about the journey 
                you've shared and the bright seasons ahead.]
            </p>
            <div class="haiku">
                <p>Autumn leaves drift by,</p>
                <p>A new year begins for you,</p>
                <p>Peace follows your path.</p>
            </div>
        </div>
    </div>
</body>
</html>
